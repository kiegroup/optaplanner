version: 2
updates:
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
    time: '04:00'
  open-pull-requests-limit: 5
  target-branch: "7.67.x"
  commit-message:
    prefix: "[bot][7.67.x]"
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: daily
    time: '01:00'
  open-pull-requests-limit: 5
  target-branch: "8.38.x-prod"
  commit-message:
    prefix: "[bot][8.38.x-prod]"    
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
